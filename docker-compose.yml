services:
  backend:
    build:
      context: ./backend
    container_name: parser-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      CORS_ORIGINS: '["http://localhost:5173"]'
      LOG_LEVEL: INFO
    volumes:
      - ./backend/app:/app/app
      - ./backend/main.py:/app/main.py
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health',timeout=3).status==200 else 1)\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: parser-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE: /api
      VITE_PROXY_TARGET: http://backend:8000
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/tailwind.config.js:/app/tailwind.config.js
      - ./frontend/postcss.config.js:/app/postcss.config.js
      - ./frontend/tsconfig.json:/app/tsconfig.json
      # Anonymous volume preserves the image's node_modules so the host
      # mount above doesn't shadow it with an empty directory.
      - /app/node_modules
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: parser-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage:z
    restart: unless-stopped

  shortlist-agent:
    build:
      context: ./shortlist_agent
    container_name: shortlist-agent
    ports:
      - "8001:8001"
    environment:
      QDRANT_URL: http://qdrant:6333
      LOG_LEVEL: INFO
    volumes:
      - ./shortlist_agent/app:/app/app
      - ./shortlist_agent/main.py:/app/main.py
    depends_on:
      - qdrant
    restart: unless-stopped
